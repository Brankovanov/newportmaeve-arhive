<section>
  <h1>Character Roster</h1>
  <p>Select a card to reveal hidden lore, or open a full profile.</p>

  <div class="grid">
    @for (character of characters; track character.slug) {
      <article class="card">
        <h2>{{ character.name }}</h2>
        <p class="role">{{ character.role }}</p>
        <div class="actions">
          <button type="button" (click)="toggleReveal(character.slug)">
            Reveal
          </button>
          <a [routerLink]="['/characters', character.slug]">Full profile</a>
        </div>

        @if (activeReveal() === character.slug) {
          <p class="reveal">{{ character.reveal }}</p>
        }
      </article>
    }
  </div>
</section>
