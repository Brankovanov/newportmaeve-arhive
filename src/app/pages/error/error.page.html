<section class="error-shell" aria-labelledby="error-title">
  <p class="code">500</p>
  <h1 id="error-title">Something Went Wrong</h1>
  <p>
    An unexpected error occurred while loading this page. You can safely return and continue exploring.
  </p>
  <div class="actions">
    <a [routerLink]="returnUrl()" class="primary">Try again</a>
    <a routerLink="/" class="secondary">Go home</a>
  </div>
</section>
