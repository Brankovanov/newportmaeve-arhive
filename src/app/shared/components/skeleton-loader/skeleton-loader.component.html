<div [class]="class() ?? ''" aria-hidden="true">
  <!-- Text skeleton (default) -->
  @if (variant() === 'text') {
    <div class="skeleton-text-wrapper">
      @for (item of getSkeletonCount(); track item) {
        <div
          class="skeleton skeleton-text"
          [class.skeleton-none]="rounded() === 'none'"
          [class.skeleton-sm]="rounded() === 'sm'"
          [class.skeleton-md]="rounded() === 'md'"
          [class.skeleton-lg]="rounded() === 'lg'"
          [class.skeleton-full]="rounded() === 'full'"
          [style.width]="item === count() - 1 ? getRandomWidth(item) : '100%'"
          [style.height]="height() || '1rem'"
        ></div>
      }
    </div>
  }

  <!-- Avatar skeleton -->
  @if (variant() === 'avatar') {
    <div
      class="skeleton skeleton-avatar skeleton-full"
      [style.width]="width() || '3rem'"
      [style.height]="height() || '3rem'"
    ></div>
  }

  <!-- Button skeleton -->
  @if (variant() === 'button') {
    <div
      class="skeleton skeleton-button"
      [class.skeleton-none]="rounded() === 'none'"
      [class.skeleton-sm]="rounded() === 'sm'"
      [class.skeleton-md]="rounded() === 'md'"
      [class.skeleton-lg]="rounded() === 'lg'"
      [style.width]="width() || '6rem'"
      [style.height]="height() || '2.5rem'"
    ></div>
  }

  <!-- Card skeleton -->
  @if (variant() === 'card') {
    <div
      class="skeleton-card"
      [class.skeleton-md]="rounded() === 'md'"
      [class.skeleton-lg]="rounded() === 'lg'"
    >
      <!-- Card header (image placeholder) -->
      <div
        class="skeleton skeleton-card-header skeleton-md"
        style="width: 100%; height: 12rem; margin-bottom: 1rem"
      ></div>

      <!-- Card content lines -->
      <div class="skeleton-card-content">
        <div
          class="skeleton skeleton-text skeleton-md"
          style="width: 80%; height: 1.25rem; margin-bottom: 0.75rem"
        ></div>
        <div
          class="skeleton skeleton-text skeleton-md"
          style="width: 100%; height: 1rem; margin-bottom: 0.75rem"
        ></div>
        <div
          class="skeleton skeleton-text skeleton-md"
          style="width: 95%; height: 1rem; margin-bottom: 1rem"
        ></div>
      </div>

      <!-- Card footer (button placeholder) -->
      <div
        class="skeleton skeleton-button skeleton-md"
        style="width: 6rem; height: 2.5rem"
      ></div>
    </div>
  }

  <!-- List skeleton -->
  @if (variant() === 'list') {
    <div class="skeleton-list-wrapper">
      @for (item of getSkeletonCount(); track item) {
        <div class="skeleton-list-item">
          <!-- Avatar -->
          <div
            class="skeleton skeleton-avatar skeleton-full"
            style="width: 2.5rem; height: 2.5rem; flex-shrink: 0"
          ></div>

          <!-- Content -->
          <div class="skeleton-list-content" style="flex: 1">
            <div
              class="skeleton skeleton-text skeleton-md"
              style="width: 70%; height: 1rem; margin-bottom: 0.5rem"
            ></div>
            <div
              class="skeleton skeleton-text skeleton-md"
              style="width: 100%; height: 0.875rem"
            ></div>
          </div>

          <!-- Action -->
          <div
            class="skeleton skeleton-button skeleton-md"
            style="width: 2rem; height: 2rem; flex-shrink: 0"
          ></div>
        </div>
      }
    </div>
  }
</div>
