<section class="share-panel" aria-label="Share this page">
  <h2 class="share-title">{{ title() }}</h2>
  <div class="share-actions">
    @if (canUseNativeShare) {
      <button type="button" class="share-button" (click)="shareNatively()" aria-label="Share with your device menu">
        Share
      </button>
    }

    <button type="button" class="share-button" (click)="copyLink()" aria-label="Copy page link to clipboard">
      Copy link
    </button>

    <a
      class="share-link"
      [href]="links().x"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Share on X"
      (click)="trackShare('x')"
    >
      X
    </a>

    <a
      class="share-link"
      [href]="links().facebook"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Share on Facebook"
      (click)="trackShare('facebook')"
    >
      Facebook
    </a>

    <a
      class="share-link"
      [href]="links().linkedin"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Share on LinkedIn"
      (click)="trackShare('linkedin')"
    >
      LinkedIn
    </a>

    <a
      class="share-link"
      [href]="links().reddit"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Share on Reddit"
      (click)="trackShare('reddit')"
    >
      Reddit
    </a>

    <a
      class="share-link"
      [href]="links().email"
      aria-label="Share by email"
      (click)="trackShare('email')"
    >
      Email
    </a>
  </div>

  @if (copyStatus() === 'done') {
    <p class="share-feedback" role="status">Link copied.</p>
  }

  @if (copyStatus() === 'error') {
    <p class="share-feedback share-feedback--error" role="status">Could not copy link on this device.</p>
  }
</section>
